name: Publish to PyPI

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Publish mode"
        required: true
        default: "dry-run"
        type: choice
        options:
          - dry-run
          - test-pypi
          - pypi

concurrency:
  group: pypi-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-tag:
    name: Validate release tag
    runs-on: ubuntu-latest

    steps:
      - name: Check tag format
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            echo "Runs must be started from a tag ref."
            exit 1
          fi

          tag="${GITHUB_REF_NAME}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+((a|b|rc|dev)[0-9]+)?$ ]]; then
            echo "Invalid release tag: $tag"
            echo "Expected vINT.INT.INT or vINT.INT.INTaINT / bINT / rcINT / devINT"
            exit 1
          fi

          echo "Tag is valid: $tag"

  publish:
    name: Publish packages
    runs-on: ubuntu-latest
    needs: validate-tag
    environment: ${{ inputs.mode == 'pypi' && 'pypi' || inputs.mode == 'test-pypi' && 'test-pypi' || '' }}
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Publish katalogue-sdk
        uses: ./.github/actions/pypi-publish-package
        with:
          mode: ${{ inputs.mode }}
          package_name: katalogue-sdk
          package_dir: packages/katalogue-sdk
          dist_glob: dist/katalogue_sdk*

      - name: Publish katalogue-cli
        uses: ./.github/actions/pypi-publish-package
        with:
          mode: ${{ inputs.mode }}
          package_name: katalogue-cli
          package_dir: packages/katalogue-cli
          dist_glob: dist/katalogue_cli*
