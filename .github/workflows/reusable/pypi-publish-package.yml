name: Publish PyPI package

on:
  workflow_call:
    inputs:
      mode:
        required: true
        type: string
      package_name:
        required: true
        type: string
      package_dir:
        required: true
        type: string
      dist_glob:
        required: true
        type: string

jobs:
  publish:
    name: Build and prepare ${{ inputs.package_name }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.mode == 'pypi' && 'pypi' || inputs.mode == 'test-pypi' && 'test-pypi' || '' }}
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v5

      - name: Build ${{ inputs.package_name }}
        working-directory: ${{ inputs.package_dir }}
        run: uv build

      - name: Publish ${{ inputs.package_name }} to TestPyPI
        if: inputs.mode == 'test-pypi'
        run: |
          echo "Would publish to TestPyPI:"
          ls ${{ inputs.dist_glob }}
        # uses: pypa/gh-action-pypi-publish@release/v1
        # with:
        #   repository-url: https://upload.test.pypi.org/legacy/
        #   packages-dir: dist/

      - name: Publish ${{ inputs.package_name }} to PyPI
        if: inputs.mode == 'pypi'
        run: |
          echo "Would publish to PyPI:"
          ls ${{ inputs.dist_glob }}
        # uses: pypa/gh-action-pypi-publish@release/v1
        # with:
        #   packages-dir: dist/
