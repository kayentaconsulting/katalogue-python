# Workspace root — contains no installable package.
# To install: cd packages/katalogue-sdk && pip install .
#             cd packages/katalogue-cli && pip install .
# For development: uv sync (from this directory)
[tool.uv.workspace]
members = ["packages/katalogue-sdk", "packages/katalogue-cli"]

[tool.pytest.ini_options]
testpaths = [
    "packages/katalogue-sdk/tests",
    "packages/katalogue-cli/tests",
]
