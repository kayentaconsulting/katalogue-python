[project]
name = "katalogue-cli"
dynamic = ["version"]
description = "CLI for the Katalogue Data Catalog API"
requires-python = ">=3.11"
dependencies = [
    "katalogue-sdk",
    "click>=8.1",
    "platformdirs>=4.0",
    "keyring>=24.0",
]

[project.scripts]
katalogue = "katalogue_cli.cli.main:cli"

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[tool.hatch.version]
source = "vcs"

[tool.hatch.version.raw-options]
root = "../.."

[tool.hatch.build.targets.wheel]
packages = ["src/katalogue_cli"]

[tool.uv.sources]
katalogue-sdk = { workspace = true }

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-mock>=3.12",
    "requests-mock>=1.11",
    "ruff>=0.15.10",
]
