[project]
name = "katalogue-sdk"
version = "0.1.0"
description = "Python SDK for the Katalogue Data Catalog API"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.0",
    "requests>=2.31",
    "requests-oauthlib>=1.3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/katalogue"]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-mock>=3.12",
    "requests-mock>=1.11",
    "ruff>=0.15.10",
    "pyright>=1.1",
]
