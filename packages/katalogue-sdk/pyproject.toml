[project]
name = "katalogue-sdk"
dynamic = ["version"]
description = "Python SDK Katalogue"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "Kayenta Consulting AB", email = "hello@katalogue.se" }]
keywords = ["katalogue", "data catalog", "sdk"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Intended Audience :: Information Technology",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Database",
]
dependencies = [
    "pydantic>=2.0",
    "requests>=2.31",
    "requests-oauthlib>=1.3",
]

[project.urls]
Homepage = "https://katalogue.se"
Repository = "https://github.com/kayentaconsulting/katalogue-cli"
"Bug Tracker" = "https://github.com/kayentaconsulting/katalogue-cli/issues"

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[tool.hatch.version]
source = "vcs"

[tool.hatch.version.raw-options]
root = "../.."

[tool.hatch.build.targets.wheel]
packages = ["src/katalogue"]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-mock>=3.12",
    "requests-mock>=1.11",
    "ruff>=0.15.10",
    "pyright>=1.1",
]
