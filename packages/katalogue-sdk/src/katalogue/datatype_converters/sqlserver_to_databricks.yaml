source: sqlserver
target: databricks

mappings:
  # String types — Databricks STRING has no length limit
  CHAR: STRING
  NCHAR: STRING
  VARCHAR: STRING
  NVARCHAR: STRING
  TEXT: STRING
  NTEXT: STRING
  UNIQUEIDENTIFIER: STRING
  SYSNAME: STRING

  # XML is not JSON-style semi-structured data; keep as text unless parsed separately
  XML: STRING

  # Semi-structured / dynamic
  SQL_VARIANT: VARIANT

  # Exact numerics — preserve precision/scale
  DECIMAL: "DECIMAL{args}"
  NUMERIC: "DECIMAL{args}"
  MONEY: "DECIMAL(19,4)"
  SMALLMONEY: "DECIMAL(10,4)"

  # Integer types
  BIT: BOOLEAN
  TINYINT: TINYINT
  SMALLINT: SMALLINT
  INT: INT
  INTEGER: INT
  BIGINT: BIGINT

  # Approximate numerics
  FLOAT: DOUBLE
  REAL: FLOAT

  # Date/time types
  DATE: DATE
  TIME: STRING

  # SQL Server date/time values without offset
  DATETIME: TIMESTAMP_NTZ
  DATETIME2: TIMESTAMP_NTZ
  SMALLDATETIME: TIMESTAMP_NTZ

  # SQL Server DATETIMEOFFSET stores offset information.
  # Databricks TIMESTAMP represents an instant but does not preserve original offset.
  DATETIMEOFFSET: TIMESTAMP

  # Binary types
  BINARY: BINARY
  VARBINARY: BINARY
  IMAGE: BINARY

  # SQL Server TIMESTAMP is a rowversion binary value, not a datetime
  ROWVERSION: BINARY
  TIMESTAMP: BINARY

  # Spatial / hierarchy types
  GEOGRAPHY: STRING
  GEOMETRY: STRING
  HIERARCHYID: STRING