source: postgres
target: databricks

mappings:
  # String types — Databricks STRING has no length limit
  CHAR: STRING
  CHARACTER: STRING
  VARCHAR: STRING
  CHARACTER_VARYING: STRING
  CHAR_VARYING: STRING
  VARCHAR2: STRING
  TEXT: STRING
  UUID: STRING
  XML: STRING
  CITEXT: STRING

  # Semi-structured
  # Generate parse_json(col) rather than a simple cast where needed.
  JSON: VARIANT
  JSONB: VARIANT

  # Exact numerics — preserve precision/scale
  DECIMAL: "DECIMAL{args}"
  NUMERIC: "DECIMAL{args}"
  MONEY: "DECIMAL(19,4)"

  # Integer types
  SMALLINT: SMALLINT
  INT2: SMALLINT
  INTEGER: INT
  INT: INT
  INT4: INT
  BIGINT: BIGINT
  INT8: BIGINT

  # Serial pseudo-types — data type only, sequence/default semantics are not preserved
  SMALLSERIAL: SMALLINT
  SERIAL: INT
  BIGSERIAL: BIGINT
  SERIAL2: SMALLINT
  SERIAL4: INT
  SERIAL8: BIGINT

  # Approximate numerics
  REAL: FLOAT
  FLOAT4: FLOAT
  DOUBLE: DOUBLE
  DOUBLE_PRECISION: DOUBLE
  FLOAT8: DOUBLE
  FLOAT: DOUBLE

  # Boolean
  BOOLEAN: BOOLEAN
  BOOL: BOOLEAN

  # Date/time types
  DATE: DATE
  TIME: STRING
  TIME_WITHOUT_TIME_ZONE: STRING
  TIMETZ: STRING
  TIME_WITH_TIME_ZONE: STRING

  # Postgres TIMESTAMP means WITHOUT TIME ZONE
  TIMESTAMP: TIMESTAMP_NTZ
  TIMESTAMP_WITHOUT_TIME_ZONE: TIMESTAMP_NTZ

  # Databricks time-zone-aware timestamp type is TIMESTAMP
  TIMESTAMPTZ: TIMESTAMP
  TIMESTAMP_WITH_TIME_ZONE: TIMESTAMP

  # Binary
  BYTEA: BINARY

  # Bit strings
  BIT: STRING
  BIT_VARYING: STRING
  VARBIT: STRING

  # Network / identifiers
  INET: STRING
  CIDR: STRING
  MACADDR: STRING
  MACADDR8: STRING

  # Full text search
  TSVECTOR: STRING
  TSQUERY: STRING

  # Geometric types
  POINT: STRING
  LINE: STRING
  LSEG: STRING
  BOX: STRING
  PATH: STRING
  POLYGON: STRING
  CIRCLE: STRING

  # Ranges
  INT4RANGE: STRING
  INT8RANGE: STRING
  NUMRANGE: STRING
  TSRANGE: STRING
  TSTZRANGE: STRING
  DATERANGE: STRING

  # Multiranges
  INT4MULTIRANGE: STRING
  INT8MULTIRANGE: STRING
  NUMMULTIRANGE: STRING
  TSMULTIRANGE: STRING
  TSTZMULTIRANGE: STRING
  DATEMULTIRANGE: STRING

  # Other
  INTERVAL: STRING
  PG_LSN: STRING
  TXID_SNAPSHOT: STRING