source: postgres
target: databricks
mappings:
  # String types — Databricks STRING has no length limit
  CHAR: STRING
  CHARACTER: STRING
  VARCHAR: STRING
  CHARACTER_VARYING: STRING
  TEXT: STRING
  UUID: STRING
  XML: VARIANT
  JSON: VARIANT
  JSONB: VARIANT
  CITEXT: STRING

  # Exact numerics — preserve precision/scale
  DECIMAL: "DECIMAL{args}"
  NUMERIC: "DECIMAL{args}"
  MONEY: "DECIMAL(19,4)"

  # Integer types
  SMALLINT: SMALLINT
  INT2: SMALLINT
  INTEGER: INT
  INT: INT
  INT4: INT
  BIGINT: BIGINT
  INT8: BIGINT
  SMALLSERIAL: SMALLINT
  SERIAL: INT
  BIGSERIAL: BIGINT

  # Approximate numerics
  REAL: FLOAT
  FLOAT4: FLOAT
  DOUBLE_PRECISION: DOUBLE
  FLOAT8: DOUBLE

  # Boolean
  BOOLEAN: BOOLEAN
  BOOL: BOOLEAN

  # Date/time types
  # TIMESTAMPTZ / TIMESTAMP WITH TIME ZONE carries TZ info → TIMESTAMP_LTZ
  # TIMESTAMP / TIMESTAMP WITHOUT TIME ZONE has no TZ → TIMESTAMP_NTZ
  DATE: DATE
  TIME: STRING
  TIMETZ: STRING
  TIME_WITH_TIME_ZONE: STRING
  TIMESTAMP: TIMESTAMP_NTZ
  TIMESTAMP_WITHOUT_TIME_ZONE: TIMESTAMP_NTZ
  TIMESTAMPTZ: TIMESTAMP_LTZ
  TIMESTAMP_WITH_TIME_ZONE: TIMESTAMP_LTZ

  # Binary
  BYTEA: BINARY

  # Bit strings
  BIT: STRING
  BIT_VARYING: STRING
