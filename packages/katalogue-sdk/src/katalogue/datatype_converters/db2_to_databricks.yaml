source: db2
target: databricks

mappings:
  # String types
  CHAR: STRING
  CHARACTER: STRING
  VARCHAR: STRING
  CHARACTER_VARYING: STRING
  CHAR_VARYING: STRING
  LONG_VARCHAR: STRING
  CLOB: STRING
  CHARACTER_LARGE_OBJECT: STRING
  CHAR_LARGE_OBJECT: STRING

  # Unicode / national character types
  NCHAR: STRING
  NATIONAL_CHAR: STRING
  NATIONAL_CHARACTER: STRING
  NVARCHAR: STRING
  NCHAR_VARYING: STRING
  NATIONAL_CHAR_VARYING: STRING
  NATIONAL_CHARACTER_VARYING: STRING
  NCLOB: STRING
  NCHAR_LARGE_OBJECT: STRING
  NATIONAL_CHARACTER_LARGE_OBJECT: STRING

  # Graphic string types
  GRAPHIC: STRING
  VARGRAPHIC: STRING
  LONG_VARGRAPHIC: STRING
  DBCLOB: STRING

  # Exact numerics — preserve precision/scale
  DECIMAL: "DECIMAL{args}"
  NUMERIC: "DECIMAL{args}"
  NUM: "DECIMAL{args}"
  DEC: "DECIMAL{args}"

  # Integer types
  SMALLINT: SMALLINT
  INTEGER: INT
  INT: INT
  BIGINT: BIGINT

  # Approximate numerics
  FLOAT: DOUBLE
  REAL: FLOAT
  DOUBLE: DOUBLE
  DOUBLE_PRECISION: DOUBLE

  # Decimal floating point
  # Option A: pragmatic approximation
  DECFLOAT: DOUBLE
  # Option B: safer decimal semantics, if your generator supports overrides
  # DECFLOAT: DECIMAL(38,16)

  # Date/time types
  DATE: DATE
  TIME: STRING
  TIMESTAMP: TIMESTAMP_NTZ
  TIMESTMP: TIMESTAMP_NTZ
  TIMESTAMP_WITHOUT_TIME_ZONE: TIMESTAMP_NTZ
  TIMESTAMP_WITH_TIME_ZONE: TIMESTAMP
  TIMESTAMPTZ: TIMESTAMP

  # Binary types
  BINARY: BINARY
  VARBINARY: BINARY
  BINARY_VARYING: BINARY
  BLOB: BINARY
  BINARY_LARGE_OBJECT: BINARY

  # Character FOR BIT DATA variants
  CHAR_FOR_BIT_DATA: BINARY
  CHARACTER_FOR_BIT_DATA: BINARY
  VARCHAR_FOR_BIT_DATA: BINARY
  CHARACTER_VARYING_FOR_BIT_DATA: BINARY
  CHAR_VARYING_FOR_BIT_DATA: BINARY

  # Semi-structured / unsupported
  XML: STRING

  # Boolean
  BOOLEAN: BOOLEAN